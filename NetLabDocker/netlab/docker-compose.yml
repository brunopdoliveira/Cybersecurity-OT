services:
    cliente1:
        image: brunopdoliveira/debian
        container_name: cliente1
        hostname: cliente1
        privileged: true
        volumes:
            - ./home/cliente1:/home
            - ./conf/resolv.conf:/etc/resolv.conf
            - ./conf/cliente1/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeCliente:
                ipv4_address: 192.168.10.10
                ipv6_address: 2001:db8:2026:10::10


    cliente2:
        image: brunopdoliveira/debian
        container_name: cliente2
        hostname: cliente2
        privileged: true
        volumes:
            - ./home/cliente2:/home
            - ./conf/resolv.conf:/etc/resolv.conf
            - ./conf/cliente2/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeCliente:
                ipv4_address: 192.168.10.20
                ipv6_address: 2001:db8:2026:10::20

    cliente3:
        image: brunopdoliveira/debian
        container_name: cliente3
        hostname: cliente3
        privileged: true
        volumes:
            - ./home/cliente3:/home
            - ./conf/resolv.conf:/etc/resolv.conf
            - ./conf/cliente3/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeCliente:
                ipv4_address: 192.168.10.30
                ipv6_address: 2001:db8:2026:10::30

    sensor:
        image: brunopdoliveira/sensor
        container_name: sensor
        hostname: sensor
        privileged: true
        volumes:
            - ./conf/sensor/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeCliente:
                ipv4_address: 192.168.10.50
                ipv6_address: 2001:db8:2026:10::50

    monitor:
        image: brunopdoliveira/monitor
        container_name: monitor
        hostname: monitor
        privileged: true
        volumes:
            - ./conf/monitor/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeCliente:
                ipv4_address: 192.168.10.60
                ipv6_address: 2001:db8:2026:10::60

    R1:
        image: brunopdoliveira/debian
        container_name: R1
        hostname: R1
        privileged: true
        volumes:
            - ./home/R1:/home
            - ./conf/roteador/frr-rip:/etc/frr
            - ./conf/roteador/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeCliente: # eth0
                ipv4_address: 192.168.10.254
                ipv6_address: 2001:db8:2026:10::254
            redeR1R2: #eth1
                ipv4_address: 10.10.50.1
                ipv6_address: 2001:db8:2026:50::1
    R2:
        image: brunopdoliveira/debian
        container_name: R2
        hostname: R2
        privileged: true
        volumes:
            - ./home/R2:/home
            - ./conf/roteador/frr-rip:/etc/frr
            - ./conf/roteador/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeR1R2: #eth0
                ipv4_address: 10.10.50.2
                ipv6_address: 2001:db8:2026:50::2
            redeServidor: #eth1
                ipv4_address: 100.100.100.254
                ipv6_address: 2001:db8:2026:100::254

    web:
        image: brunopdoliveira/debian
        container_name: web
        hostname: web
        privileged: true
        volumes:
            - ./home/web:/home
            - ./conf/web/var_html:/var/www/
            - ./conf/resolv.conf:/etc/resolv.conf
            - ./conf/web/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeServidor:
                ipv4_address: 100.100.100.10
                ipv6_address: 2001:db8:2026:100::10

    ftp:
        image: brunopdoliveira/debian
        container_name: ftp
        hostname: ftp
        privileged: true
        volumes:
            - ./home/ftp:/home
            - ./conf/ftp/etc_proftpd:/etc/proftpd
            - ./conf/resolv.conf:/etc/resolv.conf
            - ./conf/ftp/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeServidor:
                ipv4_address: 100.100.100.20
                ipv6_address: 2001:db8:2026:100::20


    ssh:
        image: brunopdoliveira/debian
        container_name: ssh
        hostname: ssh
        privileged: true
        volumes:
            - ./home/ssh:/home
            - ./conf/ssh/etc_ssh:/etc/ssh
            - ./conf/resolv.conf:/etc/resolv.conf
            - ./conf/ssh/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeServidor:
                ipv4_address: 100.100.100.30
                ipv6_address: 2001:db8:2026:100::30

    dns:
        image: brunopdoliveira/debian
        container_name: dns
        hostname: dns
        privileged: true
        volumes:
            - ./home/dns:/home
            - ./conf/dns/named.conf:/etc/bind/named.conf
            - ./conf/resolv.conf:/etc/resolv.conf
            - ./conf/dns/master:/etc/bind/master
            - ./conf/dns/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeServidor:
                ipv4_address: 100.100.100.40
                ipv6_address: 2001:db8:2026:100::40
    
    mqtt: 
        image: eclipse-mosquitto:latest
        container_name: mqtt
        hostname: mqtt
        privileged: true
        volumes:
            - ./conf/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf 
            - ./conf/mqtt/inicio.sh:/usr/local/bin/inicio.sh
        networks:
            redeServidor:
                ipv4_address: 100.100.100.50
                ipv6_address: 2001:db8:2026:100::50
        command: sh -c "/usr/local/bin/inicio.sh"

networks:
    redeCliente:
        driver: bridge
        enable_ipv6: true
        ipam:
            config:
            - subnet: 192.168.10.0/24
            - subnet: "2001:db8:2026:10::/64"
    redeR1R2:
        driver: bridge
        enable_ipv6: true
        ipam:
            config:
            - subnet: 10.10.50.0/30
            - subnet: "2001:db8:2026:50::/126"
    redeServidor:
        driver: bridge
        enable_ipv6: true
        ipam:
            config:
            - subnet: 100.100.100.0/24
            - subnet: "2001:db8:2026:100::/64"
