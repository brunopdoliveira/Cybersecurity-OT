// Configuração do BIND como servidor DNS autoritativo do NetLab

options {
	directory "/var/bind";

	// Escutar em todas as interfaces IPv4 do container
	listen-on {
		any;
	};

	// Escutar em todas as interfaces IPv6 do container
	listen-on-v6 {
		any;
	};

	// Permitir consultas das redes do laboratório
	allow-query {
		127.0.0.0/8;
		192.168.10.0/24;
		100.100.100.0/24;
		2001:db8:2026:10::/64;
		2001:db8:2026:100::/64;
	};

	// Bloquear transferência de zonas
	allow-transfer {
		none;
	};

	pid-file "/var/run/named/named.pid";

	// Servidor exclusivamente autoritativo
	allow-recursion {
		none;
	};

	recursion no;
};


// Zona direta do domínio netlab.br
zone "netlab.br" IN {
	type master;
	file "/etc/bind/master/netlab.zone";
};


// Zona reversa IPv4 da rede 192.168.10.0/24
zone "10.168.192.in-addr.arpa" IN {
	type master;
	file "/etc/bind/master/netlab.rev";
};


// Zona reversa IPv6 da rede 2001:db8:2026:10::/64
zone "0.1.0.0.6.2.0.2.8.b.d.0.1.0.0.2.ip6.arpa" IN {
	type master;
	file "/etc/bind/master/netlab.rev6";
};
